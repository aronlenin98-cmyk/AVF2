<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
  <meta charset="UTF-8">
  <title>Mensajes | La Canasta Feliz</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
</head>
<body>
<header class="p-3 bg-success text-white">
  <div class="container d-flex justify-content-between align-items-center">
    <h1 class="h3 mb-0">La Canasta Feliz 🛒</h1>
    <nav>
      <a class="btn btn-light me-2" th:href="@{/}">Inicio</a>
      <a class="btn btn-light me-2" th:href="@{/catalogo}">Catálogo</a>
      <a class="btn btn-light me-2" th:href="@{/carrito}">Carrito</a>
      <a class="btn btn-light me-2" th:href="@{/contacto}">Contacto</a>
      <a class="btn btn-warning" th:href="@{/mensajes}">Ver mensajes</a>
    </nav>
  </div>
</header>

<main class="container my-5">
  <h2 class="mb-4 text-center">📬 Mensajes recibidos</h2>

  <table class="table table-striped table-bordered shadow-sm">
    <thead class="table-success">
      <tr>
        <th>#</th>
        <th>Nombre</th>
        <th>Email</th>
        <th>Tipo</th>
        <th>Mensaje</th>
      </tr>
    </thead>
    <tbody>
      <tr th:each="m, i : ${mensajes}">
        <td th:text="${i.index + 1}"></td>
        <td th:text="${m.nombre}"></td>
        <td th:text="${m.email}"></td>
        <td>
          <span th:if="${m.tipo == 'sugerencia'}" class="badge bg-primary">Sugerencia</span>
          <span th:if="${m.tipo == 'reporte'}" class="badge bg-danger">Reporte</span>
        </td>
        <td th:text="${m.mensaje}"></td>
      </tr>
      <tr th:if="${mensajes.size() == 0}">
        <td colspan="5" class="text-center text-muted">No hay mensajes guardados aún.</td>
      </tr>
    </tbody>
  </table>

  <div class="text-center">
    <a class="btn btn-success" th:href="@{/}">Volver al inicio</a>
  </div>
</main>
</body>
</html>
