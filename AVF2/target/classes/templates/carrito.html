<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
  <meta charset="UTF-8">
  <title>Carrito | La Canasta Feliz</title>
  <link rel="stylesheet" href="/css/styles.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <script defer src="/js/app.js"></script>
</head>
<body>
  <!-- Encabezado -->
  <header class="p-3 bg-success text-white">
    <div class="container d-flex justify-content-between align-items-center">
      <h1 class="h3 mb-0">La Canasta Feliz 🛒</h1>
      <nav>
        <a class="btn btn-light me-2" th:href="@{/}">Inicio</a>
        <a class="btn btn-light me-2" th:href="@{/catalogo}">Catálogo</a>
        <a class="btn btn-light me-2" th:href="@{/carrito}">Carrito</a>
        <a class="btn btn-light" th:href="@{/contacto}">Contacto</a>
      </nav>
    </div>
  </header>

  <!-- Carrito -->
  <main class="container my-5">
    <h2 class="text-center mb-4">🛒 Tu Carrito</h2>

    <div id="cart-items" class="mb-4">
      <!-- Los productos se renderizan aquí con JS -->
    </div>

    <div class="d-flex justify-content-between align-items-center border-top pt-3">
      <h4>Total: S/<span id="cart-total">0.00</span></h4>
      <div>
        <button class="btn btn-danger me-2" onclick="clearCart()">Vaciar carrito</button>
        <button class="btn btn-success">Finalizar compra</button>
      </div>
    </div>
  </main>

  <!-- Footer -->
  <footer class="bg-dark text-white text-center py-3 mt-5">
    <p>&copy; 2025 La Canasta Feliz. Todos los derechos reservados.</p>
  </footer>
</body>
</html>
