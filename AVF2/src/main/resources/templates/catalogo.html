<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
  <meta charset="UTF-8">
  <title>Catálogo | La Canasta Feliz</title>
  <link rel="stylesheet" href="/css/styles.css">
  <script defer src="/js/app.js"></script>
</head>
<body>
  <header>
    <h1>La Canasta Feliz</h1>
    <nav>
      <a th:href="@{/}">Inicio</a>
      <a th:href="@{/catalogo}">Catálogo</a>
      <a th:href="@{/carrito}">Carrito 🛒</a>
      <a th:href="@{/contacto}">Contacto</a>
    </nav>
  </header>

  <section>
    <h2>Catálogo de Productos</h2>
    <div class="grid">
      <div class="card" th:each="p : ${products}">
        <!-- 👇 Como son links externos, basta con ${p.img} -->
        <img th:src="${p.img}" th:alt="${p.name}">
        <h4 th:text="${p.name}"></h4>
        <p th:text="${p.desc}"></p>
        <p><strong th:text="'S/' + ${p.price}"></strong></p>
        <button th:attr="onclick=|addToCart('${p.id}', '${p.name}', ${p.price}, '${p.img}')|">
          Agregar al carrito
        </button>
      </div>
    </div>
  </section>
</body>
</html>
